name: Clean And Cache Clean

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  clean-cache-clean:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run clean and cache clean
        run: pnpm run clean:all
